# Dev-инфраструктура Swatter: ровно 3 контейнера данных (ADR-0004).
# Контейнер приложения (swatter) добавится, когда появится релизный образ;
# в dev приложение запускается локально: cd server && mix phx.server
name: swatter

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swatter_dev
    ports:
      # нестандартный хост-порт, чтобы не конфликтовать с другими локальными
      # проектами; внутри compose-сети — стандартный 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    environment:
      CLICKHOUSE_DB: swatter_dev
      CLICKHOUSE_USER: swatter
      CLICKHOUSE_PASSWORD: swatter
    ports:
      - "8123:8123" # HTTP (используется ecto_ch)
      - "9000:9000" # native
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    # AOF обязателен: Redis Streams — кандидат в durable ingest-буфер (ADR-0005)
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # хост-порт 6380 по той же причине; внутри сети — 6379
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  chdata:
  redisdata:
