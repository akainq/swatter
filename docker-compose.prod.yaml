# Полная self-hosted инсталляция Swatter — 4 контейнера (ADR-0004).
#
# Coolify: создайте ресурс «Docker Compose» из этого репозитория, укажите
# этот файл. Магические переменные SERVICE_* Coolify заполнит сам
# (домен, пароли, секреты) — см. docs/DEPLOY.md.
#
# Ручной запуск без Coolify:
#   SECRET_KEY_BASE=$(openssl rand -base64 48) docker compose -f docker-compose.prod.yaml up -d
#   (остальные значения имеют безопасные для одной машины дефолты)

services:
  swatter:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Coolify назначит домен и проксирование на порт 4000
      SERVICE_FQDN_SWATTER_4000: ""
      PHX_HOST: ${SERVICE_FQDN_SWATTER:-localhost}
      PORT: "4000"
      # без Coolify задайте сами: mix phx.gen.secret / openssl rand -base64 48
      # (короткий фолбэк не пройдёт проверку Phoenix и уронит старт — осознанно)
      SECRET_KEY_BASE: ${SERVICE_BASE64_64_SECRETKEYBASE:-${SECRET_KEY_BASE:-change-me}}
      DATABASE_URL: ecto://swatter:${SERVICE_PASSWORD_POSTGRES:-swatter}@postgres:5432/swatter
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://swatter:${SERVICE_PASSWORD_CLICKHOUSE:-swatter}@clickhouse:8123/swatter
    ports:
      # при деплое в Coolify публикация не нужна (проксирует Traefik) —
      # оставлена для ручного docker compose; переопределяется env-ом
      - "${SWATTER_HTTP_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/busybox",
          "wget",
          "-q",
          "--spider",
          "http://localhost:4000/health"
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: swatter
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-swatter}
      POSTGRES_DB: swatter
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swatter"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    environment:
      CLICKHOUSE_DB: swatter
      CLICKHOUSE_USER: swatter
      CLICKHOUSE_PASSWORD: ${SERVICE_PASSWORD_CLICKHOUSE:-swatter}
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    # AOF обязателен: Redis Streams — durable ingest-буфер (ADR-0005)
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  chdata:
  redisdata:
